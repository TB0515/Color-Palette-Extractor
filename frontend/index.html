<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Color Palette Extractor</title>
  </head>
  <body>
    <h1>Color Palette Extractor</h1>
    <p>Extract Dark and Light color palettes from movie posters.</p>

    <div class="filters">
      <div class="filter-header">
        <p>Release Date</p>
        <div class="choice-card-content">
          <div class="releaseDate-option">
            <p>from</p>
            <input
              name="startYear"
              id="startYear"
              type="number"
              min="1900"
              step="1"
            />
          </div>
          <div class="releaseDate-option">
            <p>to</p>
            <input
              name="endYear"
              id="endYear"
              type="number"
              min="1900"
              step="1"
            />
          </div>
        </div>
        <p id="yearError"></p>
      </div>

      <div class="filter-header">
        <p>Genre</p>
        <div class="genreFilter">
          <select name="genre" id="genre">
            <option value="" disabled selected>Select Genre</option>
            <option value="">All Genres</option>
            <option value="28">Action</option>
            <option value="12">Adventure</option>
            <option value="16">Animation</option>
            <option value="35">Comedy</option>
            <option value="80">Crime</option>
            <option value="99">Documentary</option>
            <option value="18">Drama</option>
            <option value="10751">Family</option>
            <option value="14">Fantasy</option>
            <option value="36">History</option>
            <option value="27">Horror</option>
            <option value="10402">Music</option>
            <option value="9648">Mystery</option>
            <option value="10749">Romance</option>
            <option value="878">Science Fiction</option>
            <option value="10770">TV Movie</option>
            <option value="53">Thriller</option>
            <option value="10752">War</option>
            <option value="37">Western</option>
          </select>
        </div>
      </div>

      <div class="filter-header">
        <p>Search Movie</p>
        <div class="search-bar">
          <input
            type="text"
            id="searchInput"
            placeholder="Search for a movie..."
          />
          <button id="searchBtn">Search</button>
        </div>
      </div>
    </div>

    <div id="moviesContainer"></div>
    <div id="pageControls">
      <button id="prevPage" aria-label="Previous page">Previous</button>
      <button id="nextPage" aria-label="Next page">Next</button>
    </div>

    <div id="posterSection">
      <div id="posterWrapper">
        <div id="posterPlaceholder" aria-hidden="true">
          Select a movie poster
        </div>
        <img id="moviePoster" class="hidden" alt="Movie poster" />
      </div>

      <div id="colorButtons">
        <button id="extractDarkColor">Generate Dark-Themed Palette</button>
        <button id="extractLightColor">Generate Light-Themed Palette</button>
        <div>
          <p id="colorPalette">
            Color Palette:
            <span id="colorValues" role="status" aria-live="polite"></span>
          </p>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
